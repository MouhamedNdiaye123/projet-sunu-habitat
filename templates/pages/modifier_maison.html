{% extends 'base.html' %} {% load static %} {% block content %}


<section class="connexion-section" id="connexion">
  <div class="section-heading">
    <h2>Modifier la maison</h2>
  </div>
  <div class="connexion">
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      <label>Nom</label>
      <input type="text" name="nom" value="{{ maison.nom }}" />
      <label>Localisation</label>
      <input type="text" name="localisation" value="{{ maison.localisation }}"/>
      <label>Prix</label>
      <input type="number" name="prix" value="{{ maison.prix }}" />
      <label>Description</label>
      <textarea name="description">{{ maison.description }}</textarea>
      <label>Image</label>
      <input type="file" name="image" />
      <button type="submit">Modifier</button>
    </form>
  </div>
</section>
{% endblock %}
